<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크립토 결제 서비스 플로우 시각화</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-card: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #6c757d;
  --border: #e0e0e0;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --basepay: #0052FF;
  --binancepay: #F0B90B;
  --coinbase: #1652F0;
  --stripe: #635BFF;
  --bitpay: #1A3B6B;
  --tab-active-bg: var(--bg);
  --radius: 10px;
  --transition: 0.25s ease;
}
[data-theme="dark"] {
  --bg: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-card: #1e1e32;
  --text: #e8e8f0;
  --text-secondary: #9a9ab0;
  --border: #2a2a40;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
  --tab-active-bg: var(--bg-card);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
}
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--basepay), var(--stripe));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-actions { display: flex; gap: 12px; align-items: center; }
.theme-toggle {
  width: 44px; height: 24px;
  border-radius: 12px;
  background: var(--border);
  border: none;
  cursor: pointer;
  position: relative;
  transition: background var(--transition);
}
.theme-toggle::after {
  content: '';
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--text);
  position: absolute;
  top: 3px; left: 3px;
  transition: transform var(--transition);
}
[data-theme="dark"] .theme-toggle::after { transform: translateX(20px); }
.print-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition);
}
.print-btn:hover { background: var(--bg-secondary); }

/* Main Tabs */
.main-tabs {
  display: flex;
  gap: 0;
  padding: 0 24px;
  background: var(--bg-secondary);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
}
.main-tab {
  padding: 12px 20px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
  position: relative;
}
.main-tab:hover { color: var(--text); }
.main-tab.active {
  color: var(--text);
  border-bottom-color: var(--service-color, var(--basepay));
}
.main-tab .tab-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  vertical-align: middle;
}

/* Sub Tabs */
.sub-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.sub-tab {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.sub-tab:hover { border-color: var(--text-secondary); }
.sub-tab.active {
  background: var(--service-color, var(--basepay));
  color: #fff;
  border-color: transparent;
}

/* Content */
.content { padding: 24px; max-width: 1280px; margin: 0 auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Scenario Card */
.scenario-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow var(--transition);
}
.scenario-card:hover { box-shadow: var(--shadow-lg); }
.scenario-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.scenario-header h3 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.scenario-header h3 .svc-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  color: #fff;
  font-weight: 700;
}
.scenario-toggle {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  border: none;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  transition: transform var(--transition);
}
.scenario-toggle.open { transform: rotate(180deg); }
.scenario-body { padding: 20px; display: none; }
.scenario-body.open { display: block; }
.scenario-annotations {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.annotation-chip {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.mermaid-container {
  overflow-x: auto;
  padding: 8px 0;
}
.mermaid {
  display: flex;
  justify-content: center;
}
.mermaid svg { max-width: 100%; height: auto; }

/* Comparison Tab */
.comparison-section { margin-bottom: 32px; }
.comparison-section h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.comparison-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.comparison-table th {
  background: var(--bg-secondary);
  padding: 12px 14px;
  text-align: center;
  font-weight: 700;
  border-bottom: 2px solid var(--border);
  font-size: 13px;
}
.comparison-table td {
  padding: 10px 14px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.comparison-table tr:hover td { background: var(--bg-secondary); }
.comparison-table td:first-child {
  text-align: left;
  font-weight: 600;
  background: var(--bg-secondary);
  min-width: 140px;
}
.cell-highlight { font-weight: 700; }
.cell-warning { opacity: 0.7; }
.check { color: #4CAF50; font-weight: 700; }
.cross { color: #F44336; font-weight: 700; }
.svc-col-header { font-size: 12px; }

/* Feature Grid */
.feature-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.feature-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  border-top: 4px solid;
}
.feature-card h3 { font-size: 16px; margin-bottom: 12px; }
.feature-card .arch-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
}
.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.metric-row:last-child { border-bottom: none; }
.metric-label { color: var(--text-secondary); }
.metric-value { font-weight: 600; }

/* Strengths/Weaknesses */
.sw-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 24px;
}
.sw-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.sw-card h4 { font-size: 14px; margin-bottom: 10px; border-bottom: 2px solid; padding-bottom: 6px; }
.sw-list { list-style: none; }
.sw-list li { font-size: 12px; padding: 3px 0; padding-left: 16px; position: relative; }
.sw-list li::before { content: ''; position: absolute; left: 0; top: 9px; width: 6px; height: 6px; border-radius: 50%; }
.sw-list.strengths li::before { background: #4CAF50; }
.sw-list.weaknesses li::before { background: #F44336; }

/* Print */
@media print {
  .header, .main-tabs, .sub-tabs, .theme-toggle, .print-btn { display: none !important; }
  .tab-panel { display: block !important; }
  .scenario-body { display: block !important; }
  .scenario-card { break-inside: avoid; page-break-inside: avoid; }
  body { background: #fff; color: #000; }
}

/* Responsive */
@media (max-width: 768px) {
  .feature-grid, .sw-grid { grid-template-columns: 1fr; }
  .main-tab { padding: 10px 14px; font-size: 13px; }
  .content { padding: 16px; }
  .comparison-table { font-size: 11px; }
}
@media (max-width: 1024px) {
  .feature-grid { grid-template-columns: repeat(2, 1fr); }
  .sw-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body data-theme="light">

<div class="header">
  <h1>크립토 결제 서비스 플로우 시각화</h1>
  <div class="header-actions">
    <button class="print-btn" onclick="window.print()">인쇄</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="다크/라이트 모드 전환"></button>
  </div>
</div>

<nav class="main-tabs" id="mainTabs">
  <button class="main-tab active" data-tab="basePay" style="--service-color: #0052FF" onclick="switchMainTab('basePay')">
    <span class="tab-dot" style="background:#0052FF"></span>Base Pay
  </button>
  <button class="main-tab" data-tab="binancePay" style="--service-color: #F0B90B" onclick="switchMainTab('binancePay')">
    <span class="tab-dot" style="background:#F0B90B"></span>Binance Pay
  </button>
  <button class="main-tab" data-tab="coinbaseCommerce" style="--service-color: #1652F0" onclick="switchMainTab('coinbaseCommerce')">
    <span class="tab-dot" style="background:#1652F0"></span>Coinbase Commerce
  </button>
  <button class="main-tab" data-tab="stripeCrypto" style="--service-color: #635BFF" onclick="switchMainTab('stripeCrypto')">
    <span class="tab-dot" style="background:#635BFF"></span>Stripe Crypto
  </button>
  <button class="main-tab" data-tab="bitPay" style="--service-color: #1A3B6B" onclick="switchMainTab('bitPay')">
    <span class="tab-dot" style="background:#1A3B6B"></span>BitPay
  </button>
  <button class="main-tab" data-tab="comparison" style="--service-color: #455A64" onclick="switchMainTab('comparison')">
    <span class="tab-dot" style="background:#455A64"></span>서비스 비교
  </button>
</nav>

<div class="content" id="content"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────
const SERVICES = {
  basePay: { label: 'Base Pay', color: '#0052FF', badgeColor: '#0052FF' },
  binancePay: { label: 'Binance Pay', color: '#F0B90B', badgeColor: '#C49800' },
  coinbaseCommerce: { label: 'Coinbase Commerce', color: '#1652F0', badgeColor: '#1652F0' },
  stripeCrypto: { label: 'Stripe Crypto', color: '#635BFF', badgeColor: '#635BFF' },
  bitPay: { label: 'BitPay', color: '#1A3B6B', badgeColor: '#1A3B6B' }
};

const SCENARIOS = [
  // ─── BASE PAY ─── 결제 (3)
  {
    id: 'bp-pay-charge', service: 'basePay', category: '결제',
    title: '즉시 결제 (Charge / Direct Transfer)',
    annotations: ['수수료: 1% (머천트 부담)', 'DEX 슬리피지: 변동 (구매자 부담)', '가스비: ~$0.01 (Base)', '전체 소요: ~2초 (Base)'],
    mermaid: `graph TD
    n1((결제 시작))-->n2["머천트: 결제 요청 생성<br/>(API / Shopify 플러그인)"]
    n2-->n3["오퍼레이터: TransferIntent 생성<br/>(금액, 머천트주소, 만료, 수수료)"]
    n3-->n4["구매자: 지갑 연결 + 결제 승인"]
    n4-->n5{"결제 토큰 =<br/>정산 토큰?"}
    n5-->|"아니오 (토큰 불일치)"|n6["컨트랙트: Uniswap V3 자동 스왑<br/>(Permit2/EIP-3009)"]
    n5-->|"예 (동일 토큰)"|n7["컨트랙트: 토큰 전송 실행<br/>(원자적 처리)"]
    n6-->n7
    n7-->n8["컨트랙트: 머천트 지갑 정산<br/>+ 오퍼레이터 수수료 차감"]
    n8-->n9["Transferred 이벤트 발행<br/>(온체인 기록)"]
    n9-->n10((결제 완료))`
  },
  {
    id: 'bp-pay-authcapture', service: 'basePay', category: '결제',
    title: '에스크로 기반 인가-캡처 결제 (Authorize-Capture)',
    annotations: ['가스비: ~$0.01 (Authorize)', '수수료: 1% (Capture 시 차감)', 'Void 시 수수료 없음', '부분 캡처 지원 (총 캡처 <= maxAmount)', 'authExpiry 이전에만 Capture 가능'],
    mermaid: `graph TD
    n1((결제 시작))-->n2["오퍼레이터: PaymentInfo 생성<br/>(maxAmount, authExpiry,<br/>refundExpiry, feeBps)"]
    n2-->n3["구매자: 결제 승인 (지갑 서명)"]
    n3-->n4["AUTHORIZE<br/>구매자 자금 → 에스크로 예치"]
    n4-->n5["authorizationExpiry<br/>타이머 시작"]
    n5-->|"대기 기간"|n6["머천트: 주문 확인 / 재고 확인<br/>/ 배송 준비"]
    n6-->n7{"캡처 진행?"}
    n7-->|"캡처 실행"|n8["CAPTURE<br/>에스크로 → 머천트 전송<br/>(부분 캡처 가능)"]
    n7-->|"Void (취소)"|n9["VOID<br/>에스크로 → 구매자 전액 반환"]
    n8-->|"잔여분 처리"|n10["미캡처 잔여분<br/>구매자 자동 반환 / reclaim()"]
    n8-->n11((결제 완료))
    n9-->n12((취소 완료))
    n10-->n11`
  },
  {
    id: 'bp-pay-x402', service: 'basePay', category: '결제',
    title: 'x402 머신/AI 에이전트 결제',
    annotations: ['USDC 점유율 98.7%', 'Stripe x402 수수료: 0% (월 1,000건 무료)', '가스비: ~$0.01 (Base), 소요시간: ~2초', 'x402 Foundation: Google, AWS, Visa, Circle, Anthropic'],
    mermaid: `graph TD
    n1((리소스 요청))-->n2["클라이언트: HTTP GET<br/>유료 리소스 요청"]
    n2-->n3["서버: HTTP 402 응답<br/>+ Invoice 반환<br/>(금액, 수신주소, 유효기간, 스킴)"]
    n3-->n4{"결제 스킴?"}
    n4-->|"exact/upto"|n5["클라이언트: USDC 결제 서명 생성<br/>(EIP-3009/Permit2/ERC-7710)"]
    n5-->n6["클라이언트: PAYMENT-SIGNATURE<br/>HTTP 헤더에 서명 포함 재요청"]
    n6-->n7["Facilitator: 결제 검증<br/>(서명 복원, 잔고 확인,<br/>금액 일치, 시뮬레이션)"]
    n7-->n8{"검증 성공?"}
    n8-->|"성공"|n9["블록체인: 온체인 정산<br/>transferWithAuthorization()"]
    n8-.->|"실패"|n11["서버: HTTP 402<br/>결제 실패 반환"]
    n9-->n10["서버: HTTP 200<br/>리소스 제공"]
    n10-->n12((완료))
    n11-->n12`
  },
  // ─── BASE PAY ─── 정산 (3)
  {
    id: 'bp-set-charge', service: 'basePay', category: '정산',
    title: '온체인 즉시 정산 (Charge)',
    annotations: ['정산 속도: ~2초 (Base)', '정산 수수료: 1% (결제 수수료에 포함)', '정산 통화: USDC(기본), ETH 등'],
    mermaid: `graph TD
    n1((결제 실행))-->n2{"결제 토큰 =<br/>정산 토큰?"}

    annotations: ['authExpiry 이전에만 Capture 가능', 'Capture 시 즉시 정산', '미캡처분은 reclaim()으로 회수'],
    mermaid: `graph TD
    n1((Authorize 완료))-->n2["자금 Token Store에 보관"]
    n2-->n3["오퍼레이터: 머천트 확인 후<br/>Capture 요청"]
    n3-->n4{"전액 캡처?<br/>부분 캡처?"}

    n4-->|"부분"|n6["부분 캡처<br/>일부 → 머천트 전송"]
    n5-->n8((정산 완료))
    n6-->n7["잔여분 구매자 반환<br/>(reclaim 가능)"]
    n7-->n8`
  },
  {
    id: 'bp-set-fiat', service: 'basePay', category: '정산',

    n5-->n8["현지 통화 정산"]
    n6-->n9["은행 출금"]
    n7-->n9
    n8-->n9
    n9-->n10((법정화폐 정산 완료))`
  },
  // ─── BASE PAY ─── 환불 (5)
  {

// ─── RENDERING ──────────────────────────────────────────────────────────
let currentMainTab = 'basePay';
let currentSubTab = '결제';
let mermaidInitDone = false;

function initMermaid() {
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  mermaid.initialize({
    startOnLoad: false,
    theme: isDark ? 'dark' : 'default',
    flowchart: {
      useMaxWidth: true,
      htmlLabels: true,
      curve: 'basis',
      padding: 12,
      nodeSpacing: 40,
      rankSpacing: 50
    },
    themeVariables: isDark ? {
      primaryColor: '#2a2a40',
      primaryTextColor: '#e8e8f0',
      primaryBorderColor: '#4a4a60',
      lineColor: '#6a6a80',
      secondaryColor: '#1e1e32',
      tertiaryColor: '#1a1a2e',
      fontSize: '13px'
    } : {
      primaryColor: '#e8f0fe',
      primaryTextColor: '#1a1a2e',
      primaryBorderColor: '#90a4ae',
      lineColor: '#616161',
      secondaryColor: '#f0f4f8',
      tertiaryColor: '#fafafa',
      fontSize: '13px'
    }
  });
  mermaidInitDone = true;
}

function getServiceScenarios(serviceId, category) {
  return SCENARIOS.filter(s => s.service === serviceId && s.category === category);
}

function renderScenarioCard(scenario, index) {
  const svc = SERVICES[scenario.service];
  const cardId = `card-${scenario.id}`;
  const mermaidId = `mermaid-${scenario.id}-${Date.now()}-${index}`;
  const annotationsHtml = scenario.annotations
    .map(a => `<span class="annotation-chip">${a}</span>`)
    .join('');

  return `
    <div class="scenario-card" id="${cardId}">
      <div class="scenario-header" onclick="toggleScenario('${cardId}')">
        <h3>
          <span class="svc-badge" style="background:${svc.badgeColor}">${svc.label}</span>
          ${scenario.title}
        </h3>
        <button class="scenario-toggle" id="toggle-${cardId}">&#9660;</button>
      </div>
      <div class="scenario-body" id="body-${cardId}">
        <div class="mermaid-container">
          <div class="mermaid" id="${mermaidId}">${scenario.mermaid}</div>
        </div>
        <div class="scenario-annotations">${annotationsHtml}</div>
      </div>
    </div>`;
}

function renderServiceTab(serviceId) {
  const categories = ['결제', '정산', '환불'];
  const svc = SERVICES[serviceId];
  const subTabsHtml = categories.map(c =>
    `<button class="sub-tab ${c === currentSubTab ? 'active' : ''}" style="--service-color: ${svc.color}" onclick="switchSubTab('${c}')">${c}</button>`
  ).join('');

  const scenarios = getServiceScenarios(serviceId, currentSubTab);
  const scenariosHtml = scenarios.map((s, i) => renderScenarioCard(s, i)).join('');

  return `
    <div class="sub-tabs">${subTabsHtml}</div>
    <div style="margin-top: 16px;">
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
        ${svc.label} - ${currentSubTab} 시나리오 (${scenarios.length}개) &mdash; 카드를 클릭하여 플로우차트를 확인하세요
      </p>
      ${scenariosHtml}
    </div>`;
}

function renderComparisonTab() {
  const subTabs = ['결제 비교', '정산 비교', '환불 비교'];
  const activeSub = currentSubTab.includes('비교') ? currentSubTab : '결제 비교';
  const subTabsHtml = subTabs.map(c =>
    `<button class="sub-tab ${c === activeSub ? 'active' : ''}" style="--service-color: #455A64" onclick="switchSubTab('${c}')">${c}</button>`
  ).join('');

  let bodyHtml = '';
  if (activeSub === '결제 비교') {
    bodyHtml = renderPaymentComparison();
  } else if (activeSub === '정산 비교') {
    bodyHtml = renderSettlementComparison();
  } else {
    bodyHtml = renderRefundComparison();
  }

  return `<div class="sub-tabs">${subTabsHtml}</div><div style="margin-top: 16px;">${bodyHtml}</div>`;
}

    if (!currentSubTab.includes('비교')) currentSubTab = '결제 비교';
  } else {
    if (currentSubTab.includes('비교')) currentSubTab = '결제';
  }
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.main-tab[data-tab="${tabId}"]`).classList.add('active');
  renderContent();
}

function switchSubTab(tab) {
  currentSubTab = tab;
  renderContent();
}

function toggleScenario(cardId) {
  const body = document.getElementById(`body-${cardId}`);
  const toggle = document.getElementById(`toggle-${cardId}`);
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  toggle.classList.toggle('open', !isOpen);

  if (!isOpen) {
    const mermaidEl = body.querySelector('.mermaid');
    if (mermaidEl && !mermaidEl.getAttribute('data-processed')) {
      renderMermaidElement(mermaidEl);
    }
  }
}

async function renderMermaidElement(el) {
  try {
    const id = el.id || `mermaid-${Date.now()}`;
    const graphDef = el.textContent.trim();
    el.textContent = '';
    const { svg } = await mermaid.render(id + '-svg', graphDef);
    el.innerHTML = svg;
    el.setAttribute('data-processed', 'true');
  } catch (err) {
    el.innerHTML = `<p style="color: #F44336; font-size: 13px;">다이어그램 렌더링 오류: ${err.message}</p>`;
  }
}

function renderContent() {
  const content = document.getElementById('content');
  if (currentMainTab === 'comparison') {
    content.innerHTML = renderComparisonTab();
  } else {
    content.innerHTML = renderServiceTab(currentMainTab);
  }
}

function toggleTheme() {
  const body = document.body;
  const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', newTheme);
  initMermaid();
  // Re-render to reset mermaid diagrams
  renderContent();
}

// ─── INIT ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMermaid();
  renderContent();
});
</script>
</body>
</html>
